<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DonghuaVerse — Streaming Donghua Sub Indo</title>
<meta name="description" content="Nonton Donghua subtitle Indonesia terlengkap.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐉</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap');

:root {
  --bg:#07070e;--bg2:#0d0d1a;--bg3:#12121f;--bg4:#1a1a2e;
  --card:rgba(255,255,255,.03);--card-h:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.06);--border-h:rgba(255,45,85,.4);
  --red:#ff2d55;--red2:#e8003d;--red-glow:rgba(255,45,85,.2);
  --gold:#ffb800;--gold-d:rgba(255,184,0,.15);
  --text:#f0f0f8;--muted:#4a4a6a;--muted2:#8888aa;
  --r:14px;--rs:8px;--nav-h:68px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
button{cursor:pointer;font-family:inherit;border:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px}

.wrap{max-width:1400px;margin:0 auto;padding:0 28px}
.page{padding:calc(var(--nav-h) + 32px) 0 80px;min-height:100vh}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:500;
  background:rgba(7,7,14,.92);backdrop-filter:blur(24px) saturate(1.5);
  border-bottom:1px solid var(--border)}
.nav-in{display:flex;align-items:center;gap:12px;height:100%;max-width:1400px;margin:0 auto;padding:0 28px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.65rem;letter-spacing:.08em;color:var(--red);cursor:pointer;flex-shrink:0;text-shadow:0 0 40px var(--red-glow);transition:text-shadow .3s}
.logo:hover{text-shadow:0 0 60px var(--red-glow),0 0 100px var(--red-glow)}
.logo span{color:var(--text)}
.nav-links{display:flex;align-items:center;gap:2px;margin-left:24px}
.nav-btn{padding:7px 14px;border-radius:var(--rs);font-size:.875rem;font-weight:500;color:var(--muted2);background:none;transition:all .2s;cursor:pointer;letter-spacing:.01em}
.nav-btn:hover{color:var(--text);background:var(--card-h)}
.nav-btn.act{color:var(--text)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.search-pill{display:flex;align-items:center;gap:8px;padding:8px 18px;border-radius:50px;background:var(--bg3);border:1px solid var(--border);color:var(--muted2);font-size:.85rem;font-family:inherit;cursor:pointer;transition:all .2s}
.search-pill:hover{border-color:var(--red);color:var(--text)}

/* SEARCH OVERLAY */
.soverlay{position:fixed;inset:0;z-index:600;background:rgba(7,7,14,.97);backdrop-filter:blur(30px);display:none;flex-direction:column;align-items:center;padding-top:120px}
.soverlay.open{display:flex;animation:fadein .2s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.s-wrap{width:100%;max-width:680px;padding:0 20px}
.s-wr{position:relative}
.s-wr svg{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--muted)}
.s-inp{width:100%;padding:16px 20px 16px 52px;background:var(--bg3);border:1px solid var(--border);border-radius:50px;color:var(--text);font-family:inherit;font-size:1.1rem;outline:none;transition:all .2s}
.s-inp:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow)}
.s-close{position:fixed;top:28px;right:32px;background:var(--bg3);border:1px solid var(--border);color:var(--muted2);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .2s;cursor:pointer}
.s-close:hover{border-color:var(--red);color:var(--red)}
.s-res{margin-top:20px;max-height:55vh;overflow-y:auto}
.s-item{display:flex;gap:14px;align-items:center;padding:12px 14px;border-radius:var(--r);cursor:pointer;transition:background .15s;border:1px solid transparent}
.s-item:hover{background:var(--card-h);border-color:var(--border)}
.s-item img{width:44px;height:62px;object-fit:cover;border-radius:6px;flex-shrink:0}
.s-it{font-weight:600;font-size:.9rem;margin-bottom:3px}
.s-im{font-size:.75rem;color:var(--muted2)}

/* HERO */
.hero{height:90vh;min-height:560px;max-height:820px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;filter:brightness(.28) saturate(1.5);transform:scale(1.04);transition:background-image .8s}
.hero-ov{position:absolute;inset:0;
  background:linear-gradient(to right,rgba(7,7,14,1) 28%,rgba(7,7,14,.15) 65%,rgba(7,7,14,.5) 100%),
             linear-gradient(to top,rgba(7,7,14,1) 0%,transparent 55%),
             linear-gradient(to bottom,rgba(7,7,14,.6) 0%,transparent 18%)}
.hero-c{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:1400px;padding:0 28px 80px;display:flex;align-items:flex-end}
.hero-content{max-width:580px}
.hero-tag{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;padding:4px 12px;border-radius:4px;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,6vw,5.5rem);line-height:.95;letter-spacing:.02em;margin-bottom:18px;text-shadow:0 4px 40px rgba(0,0,0,.9)}
.hero-meta{display:flex;align-items:center;gap:20px;margin-bottom:18px;flex-wrap:wrap}
.hero-meta span{font-size:.85rem;color:var(--muted2);display:flex;align-items:center;gap:5px}
.hero-rating{color:var(--gold)!important;font-weight:700}
.hero-desc{font-size:.93rem;color:var(--muted2);line-height:1.85;margin-bottom:28px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:var(--rs);font-weight:600;font-size:.9rem;transition:all .2s;cursor:pointer;letter-spacing:.01em}
.btn-red{background:var(--red);color:#fff;box-shadow:0 4px 24px rgba(255,45,85,.4)}
.btn-red:hover{background:#ff4468;transform:translateY(-2px);box-shadow:0 8px 36px rgba(255,45,85,.5)}
.btn-ghost{background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(255,255,255,.12)}
.btn-ghost:hover{background:rgba(255,255,255,.15);transform:translateY(-2px)}

/* SECTIONS */
.sec{margin-bottom:52px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.55rem;letter-spacing:.06em;display:flex;align-items:center;gap:10px}
.sec-line{display:inline-block;width:3px;height:22px;background:var(--red);border-radius:2px;flex-shrink:0;box-shadow:0 0 12px var(--red)}
.sec-more{font-size:.8rem;color:var(--muted2);cursor:pointer;display:flex;align-items:center;gap:4px;transition:color .2s;background:none;border:none}
.sec-more:hover{color:var(--red)}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.grid.wide{grid-template-columns:repeat(auto-fill,minmax(195px,1fr))}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .3s}
.card:hover{transform:translateY(-6px);border-color:var(--border-h);box-shadow:0 20px 60px rgba(255,45,85,.18)}
.card-thumb{position:relative;padding-top:145%;overflow:hidden;background:var(--bg4)}
.card-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .5s}
.card:hover .card-thumb img{transform:scale(1.08)}
.card-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,7,14,.9) 0%,transparent 50%);opacity:0;transition:opacity .3s}
.card:hover .card-ov{opacity:1}
.card-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);width:52px;height:52px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;opacity:0;transition:all .3s;box-shadow:0 0 30px var(--red-glow)}
.card:hover .card-play{opacity:1;transform:translate(-50%,-50%) scale(1)}
.cb{position:absolute;top:10px;left:10px;padding:3px 8px;border-radius:4px;font-size:.63rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.cb-on{background:var(--red);color:#fff}
.cb-done{background:#00c853;color:#000}
.cb-ep{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.85);color:var(--gold);border:1px solid rgba(255,184,0,.3);padding:3px 8px;border-radius:4px;font-size:.66rem;font-weight:700}
.card-info{padding:12px}
.card-title{font-weight:600;font-size:.875rem;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.card-meta{display:flex;align-items:center;justify-content:space-between;font-size:.72rem;color:var(--muted2)}
.card-rat{color:var(--gold);font-weight:700}

/* ONGOING SIDEBAR */
.oi-list{display:flex;flex-direction:column;gap:8px}
.oi{display:flex;gap:12px;align-items:center;padding:10px 12px;border-radius:var(--rs);background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .2s}
.oi:hover{background:var(--card-h);border-color:var(--border-h)}
.oi img{width:44px;height:60px;object-fit:cover;border-radius:6px;flex-shrink:0}
.oi-info{flex:1;min-width:0}
.oi-tit{font-weight:600;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.oi-ep{font-size:.72rem;color:var(--muted2);margin-top:3px}
.oi-new{flex-shrink:0;padding:2px 8px;background:var(--red-glow);border:1px solid var(--red);color:var(--red);border-radius:20px;font-size:.6rem;font-weight:700}

/* PLAYER */
.player-wrap{background:#000;border-radius:var(--r);overflow:hidden;position:relative;padding-top:56.25%;box-shadow:0 24px 80px rgba(0,0,0,.8)}
.player-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.player-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--bg3);color:var(--muted2)}
.player-empty-ico{width:72px;height:72px;border-radius:50%;background:var(--bg4);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.8rem}

/* SERVER TABS */
.stabs{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.stab{padding:8px 18px;border-radius:var(--rs);background:var(--bg3);border:1px solid var(--border);color:var(--muted2);font-size:.82rem;font-weight:600;transition:all .2s;cursor:pointer}
.stab:hover{border-color:var(--red);color:var(--text)}
.stab.act{background:var(--red-glow);border-color:var(--red);color:var(--red)}

/* EP NAV */
.ep-nav{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;margin:20px 0}
.ep-nb{padding:10px 16px;border-radius:var(--rs);background:var(--bg3);border:1px solid var(--border);font-size:.82rem;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:8px;color:var(--text)}
.ep-nb:hover{border-color:var(--border-h);background:var(--card-h)}
.ep-nb.prev{justify-content:flex-start}
.ep-nb.next{justify-content:flex-end}
.ep-nav-mid{padding:10px 16px;border-radius:var(--rs);background:var(--red-glow);border:1px solid var(--red);color:var(--red);font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:6px;white-space:nowrap}

/* EP LIST */
.ep-list{display:flex;flex-direction:column;gap:5px;max-height:480px;overflow-y:auto}
.ep-item{display:flex;align-items:center;gap:14px;padding:11px 14px;border-radius:var(--rs);background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .2s}
.ep-item:hover{background:var(--card-h);border-color:var(--border-h)}
.ep-item.cur{background:var(--red-glow);border-color:var(--red)}
.ep-n{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--red);width:50px;flex-shrink:0;letter-spacing:.05em}
.ep-t{flex:1;font-weight:500;font-size:.875rem}
.ep-d{font-size:.72rem;color:var(--muted2);flex-shrink:0}

/* DOWNLOADS */
.dl-qual{font-family:'Bebas Neue',sans-serif;letter-spacing:.08em;font-size:1rem;color:var(--gold);margin-bottom:8px;margin-top:16px}
.dl-btns{display:flex;flex-wrap:wrap;gap:8px}
.dl-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--rs);background:var(--gold-d);border:1px solid rgba(255,184,0,.25);color:var(--gold);font-size:.82rem;font-weight:600;transition:all .2s}
.dl-btn:hover{background:var(--gold);color:#000;transform:translateY(-2px)}

/* COMMENTS */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.inp{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:inherit;font-size:.9rem;outline:none;transition:all .2s}
.inp:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow)}
textarea.inp{resize:vertical;min-height:90px}
.comment-list{display:flex;flex-direction:column;gap:10px}
.citem{padding:16px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--border)}
.chead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cavatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--red),var(--gold));display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;color:#fff}
.cname{font-weight:700;font-size:.875rem}
.ctime{font-size:.72rem;color:var(--muted2);margin-left:auto}
.cbody{font-size:.875rem;color:var(--muted2);line-height:1.7}

/* SERIES INFO */
.series-hero{display:grid;grid-template-columns:220px 1fr;gap:36px;margin-bottom:40px}
.series-poster{border-radius:var(--r);overflow:hidden;aspect-ratio:2/3;width:100%;object-fit:cover;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.series-det h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,4vw,3.2rem);letter-spacing:.03em;line-height:1;margin-bottom:12px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0}
.tag{padding:5px 12px;border-radius:20px;font-size:.75rem;font-weight:600;background:var(--bg4);border:1px solid var(--border);color:var(--muted2)}
.tag.red{background:var(--red-glow);border-color:var(--red);color:var(--red)}
.tag.gold{background:var(--gold-d);border-color:rgba(255,184,0,.3);color:var(--gold)}
.meta-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;margin:16px 0}
.meta-k{font-size:.78rem;color:var(--muted2)}
.meta-v{font-size:.875rem;font-weight:500}
.synopsis{font-size:.9rem;color:var(--muted2);line-height:1.85;margin-top:14px}

/* SCHEDULE */
.sched-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px}
.day-col{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.day-col.today{border-color:var(--red);box-shadow:0 0 24px var(--red-glow)}
.day-head{padding:10px;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.08em;color:var(--muted2);border-bottom:1px solid var(--border);text-align:center}
.day-col.today .day-head{color:var(--red)}
.day-items{padding:10px;display:flex;flex-direction:column;gap:8px}
.day-item{cursor:pointer;transition:opacity .2s}
.day-item:hover{opacity:.75}
.day-item img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:6px;margin-bottom:5px}
.day-item-tit{font-size:.68rem;font-weight:600;line-height:1.3;text-align:center;color:var(--muted2)}

/* GENRE FILTER */
.genre-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.gchip{padding:7px 16px;border-radius:50px;background:var(--bg3);border:1px solid var(--border);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;color:var(--muted2)}
.gchip:hover{border-color:var(--border-h);color:var(--text)}
.gchip.act{background:var(--red-glow);border-color:var(--red);color:var(--red)}

/* SEARCH BAR */
.sbar-wrap{position:relative;margin-bottom:28px}
.sbar-wrap svg{position:absolute;left:20px;top:50%;transform:translateY(-50%);color:var(--muted)}
.sbar{width:100%;padding:16px 20px 16px 54px;background:var(--bg3);border:1px solid var(--border);border-radius:50px;color:var(--text);font-family:inherit;font-size:1rem;outline:none;transition:all .2s}
.sbar:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow)}
.filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.fsep{width:1px;height:24px;background:var(--border)}
select.fsel{padding:7px 14px;border-radius:50px;background:var(--bg3);border:1px solid var(--border);color:var(--muted2);font-family:inherit;font-size:.82rem;outline:none;cursor:pointer}

/* LOADER / EMPTY */
.loader{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--muted2)}
.spin{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--red);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--muted2)}
.empty-icon{font-size:3rem;margin-bottom:12px}
.empty h3{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.05em;margin-bottom:8px;color:var(--text)}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;z-index:9999;padding:12px 22px;border-radius:var(--rs);background:var(--bg3);border:1px solid var(--border);font-size:.875rem;font-weight:600;transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:#00c853;color:#00c853}
.toast.err{border-color:var(--red);color:var(--red)}

/* 2-col layout */
.l2{display:grid;grid-template-columns:1fr 300px;gap:28px;align-items:start}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--muted2);margin-bottom:20px;flex-wrap:wrap}
.breadcrumb a:hover{color:var(--red)}
.divider{height:1px;background:var(--border);margin:28px 0}
.info-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.info-box-head{padding:14px 16px;border-bottom:1px solid var(--border);font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.06em;color:var(--muted2)}

footer{border-top:1px solid var(--border);padding:48px 28px;margin-top:60px;text-align:center;color:var(--muted2);font-size:.85rem}
.foot-logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em;color:var(--red);display:block;margin-bottom:8px;text-shadow:0 0 40px var(--red-glow)}
footer p{color:var(--muted);font-size:.78rem;margin-top:4px}

@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:slideUp .5s ease both}

@media(max-width:1024px){.sched-grid{grid-template-columns:repeat(4,1fr)}.l2{grid-template-columns:1fr}}
@media(max-width:768px){:root{--nav-h:60px}.wrap{padding:0 16px}.hero{height:75vh}.hero-title{font-size:2.8rem}.series-hero{grid-template-columns:140px 1fr;gap:20px}.sched-grid{grid-template-columns:repeat(3,1fr)}.nav-links{display:none}.form-row{grid-template-columns:1fr}}
@media(max-width:480px){.sched-grid{grid-template-columns:repeat(2,1fr)}.series-hero{grid-template-columns:1fr}.series-poster{max-width:180px;margin:0 auto}}

</style>
</head>
<body>
<nav>
  <div class="nav-in">
    <div class="logo" onclick="location.href='index.html'">DONGHUA<span>VERSE</span></div>
    <div class="nav-links">
      <button class="nav-btn" onclick="location.href='index.html'" id="nb-home">Beranda</button>
      <button class="nav-btn" onclick="location.href='schedule.html'" id="nb-sched">Jadwal</button>
      <button class="nav-btn" onclick="location.href='search.html'" id="nb-search">Series</button>
    </div>
    <div class="nav-right">
      <button class="search-pill" id="s-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Cari Donghua
      </button>
    </div>
  </div>
</nav>
<div class="soverlay" id="soverlay">
  <button class="s-close" id="s-close">✕</button>
  <div class="s-wrap">
    <div class="s-wr">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="s-inp" id="s-inp" placeholder="Cari judul donghua...">
    </div>
    <div class="s-res" id="s-res"></div>
  </div>
</div>
<div class="hero" id="hero">
  <div class="hero-bg" id="hero-bg"></div>
  <div class="hero-ov"></div>
  <div class="hero-c">
    <div class="hero-content">
      <div class="hero-tag">🔥 Episode Terbaru</div>
      <h1 class="hero-title" id="hero-title">Memuat...</h1>
      <div class="hero-meta" id="hero-meta"></div>
      <p class="hero-desc" id="hero-desc"></p>
      <div class="hero-btns" id="hero-btns"></div>
    </div>
  </div>
</div>
<main class="wrap">
  <section class="sec" style="margin-top:48px">
    <div class="sec-hd">
      <h2 class="sec-title"><span class="sec-line"></span>Episode Terbaru</h2>
      <button class="sec-more" onclick="location.href='search.html'">Lihat Semua →</button>
    </div>
    <div id="latest" class="grid"><div class="loader"><div class="spin"></div> Memuat...</div></div>
  </section>
  <div style="display:grid;grid-template-columns:1fr 280px;gap:36px;align-items:start">
    <section class="sec">
      <div class="sec-hd">
        <h2 class="sec-title"><span class="sec-line"></span>Sedang Tayang</h2>
        <button class="sec-more" onclick="location.href='search.html?status=Ongoing'">Lihat Semua →</button>
      </div>
      <div id="ongoing" class="grid wide"><div class="loader"><div class="spin"></div></div></div>
    </section>
    <aside>
      <section class="sec">
        <div class="sec-hd"><h2 class="sec-title" style="font-size:1.1rem"><span class="sec-line"></span>Update</h2></div>
        <div class="oi-list" id="sidebar-list"><div class="loader"><div class="spin"></div></div></div>
      </section>
    </aside>
  </div>
</main>
<footer>
  <span class="foot-logo">DONGHUAVERSE</span>
  <p>Streaming Donghua Subtitle Indonesia</p>
  <p>Data diperbarui otomatis dari Anichin.cafe</p>
</footer>
<script>
// ═══════════════════════════════════════
// DonghuaVerse — app.js
// ═══════════════════════════════════════

let _sb = null;

async function initSB() {
  if (_sb) return _sb;
  const r = await fetch('api/config');
  const { supabaseUrl, supabaseKey } = await r.json();
  _sb = window.supabase.createClient(supabaseUrl, supabaseKey);
  return _sb;
}

// ── DB helpers ──────────────────────────
async function getLatestEpisodes(limit = 24) {
  const s = await initSB();
  const { data } = await s.from('episodes')
    .select('*, series:series_id(title,thumb,genres,rating,status,slug)')
    .order('created_at', { ascending: false }).limit(limit);
  return data || [];
}

async function getOngoingSeries(limit = 24) {
  const s = await initSB();
  const { data } = await s.from('series')
    .select('*').eq('status', 'Ongoing')
    .order('updated_at', { ascending: false }).limit(limit);
  return data || [];
}

async function getSeriesBySlug(slug) {
  const s = await initSB();
  const { data } = await s.from('series').select('*').eq('slug', slug).single();
  return data;
}

async function getEpisodesBySeries(slug) {
  const s = await initSB();
  const { data } = await s.from('episodes').select('*')
    .eq('series_slug', slug).order('created_at', { ascending: false });
  return data || [];
}

async function getEpisodeByUrl(url) {
  const s = await initSB();
  const { data } = await s.from('episodes')
    .select('*, series:series_id(*)').eq('url', url).single();
  return data;
}

async function getServers(epId) {
  const s = await initSB();
  const { data } = await s.from('servers').select('*').eq('episode_id', epId);
  return data || [];
}

async function getDownloads(epId) {
  const s = await initSB();
  const { data } = await s.from('downloads').select('*').eq('episode_id', epId);
  return data || [];
}

async function getSchedule() {
  const s = await initSB();
  const { data } = await s.from('schedule').select('*, series:series_id(slug)').order('title');
  return data || [];
}

async function searchSeries(q) {
  const s = await initSB();
  const { data } = await s.from('series').select('*').ilike('title', `%${q}%`).limit(20);
  return data || [];
}

async function getComments(url) {
  const s = await initSB();
  const { data } = await s.from('comments').select('*')
    .eq('episode_url', url).order('created_at', { ascending: false });
  return data || [];
}

async function postComment(url, name, body) {
  const s = await initSB();
  const { error } = await s.from('comments').insert({ episode_url: url, name, body });
  return !error;
}

// ── HTML helpers ────────────────────────
function cardHTML(s, ep = null) {
  const badge = s.status === 'Ongoing'
    ? `<span class="cb cb-on">Ongoing</span>`
    : `<span class="cb cb-done">Tamat</span>`;
  const epBadge = ep ? `<span class="cb-ep">Ep ${ep.ep_num}</span>` : '';
  return `
  <div class="card" onclick="goSeries('${s.slug}')">
    <div class="card-thumb">
      <img src="${s.thumb||''}" alt="${s.title||''}" loading="lazy" onerror="this.src='https://placehold.co/200x290/12121f/4a4a6a?text=No+Image'">
      <div class="card-ov"></div>
      <div class="card-play">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
      </div>
      ${badge}${epBadge}
    </div>
    <div class="card-info">
      <div class="card-title">${s.title||''}</div>
      <div class="card-meta">
        <span class="card-genre">${(s.genres||[]).slice(0,2).join(', ')}</span>
        ${s.rating ? `<span class="card-rat">★ ${s.rating}</span>` : ''}
      </div>
    </div>
  </div>`;
}

function epCardHTML(ep) {
  const s = ep.series || {};
  return `
  <div class="card" onclick="goEp('${encodeURIComponent(ep.url)}')">
    <div class="card-thumb">
      <img src="${s.thumb||''}" alt="${ep.title||''}" loading="lazy" onerror="this.src='https://placehold.co/200x290/12121f/4a4a6a?text=No+Image'">
      <div class="card-ov"></div>
      <div class="card-play">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
      </div>
      ${ep.ep_num ? `<span class="cb-ep">Ep ${ep.ep_num}</span>` : ''}
    </div>
    <div class="card-info">
      <div class="card-title">${s.title||ep.title||''}</div>
      <div class="card-meta">
        <span>${timeAgo(ep.created_at)}</span>
        ${s.rating ? `<span class="card-rat">★ ${s.rating}</span>` : ''}
      </div>
    </div>
  </div>`;
}

// ── Navigation ──────────────────────────
function goSeries(slug) { location.href = `series.html?slug=${slug}`; }
function goEp(enc) { location.href = `episode.html?url=${enc}`; }

// ── Utils ────────────────────────────────
function timeAgo(iso) {
  if (!iso) return '';
  const d = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (d === 0) { const h = Math.floor((Date.now() - new Date(iso)) / 3600000); return h < 1 ? 'Baru saja' : `${h}j lalu`; }
  if (d < 30) return `${d}h lalu`;
  return new Date(iso).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
}

function getParam(k) { return new URLSearchParams(location.search).get(k); }

function toast(msg, type = 'ok') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3000);
}

// ── Search overlay ───────────────────────
function initSearch() {
  const btn = document.getElementById('s-btn');
  const close = document.getElementById('s-close');
  const overlay = document.getElementById('soverlay');
  const inp = document.getElementById('s-inp');
  if (!btn || !overlay) return;

  btn.onclick = () => { overlay.classList.add('open'); inp?.focus(); };
  close.onclick = () => overlay.classList.remove('open');
  overlay.onclick = e => { if (e.target === overlay) overlay.classList.remove('open'); };
  document.addEventListener('keydown', e => { if (e.key === 'Escape') overlay.classList.remove('open'); });

  let timer;
  inp?.addEventListener('input', () => {
    clearTimeout(timer);
    const q = inp.value.trim();
    const res = document.getElementById('s-res');
    if (!q) { res.innerHTML = ''; return; }
    timer = setTimeout(async () => {
      res.innerHTML = '<div class="loader"><div class="spin"></div></div>';
      const results = await searchSeries(q);
      if (!results.length) { res.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted2)">Tidak ada hasil</div>'; return; }
      res.innerHTML = results.map(s => `
        <div class="s-item" onclick="goSeries('${s.slug}')">
          <img src="${s.thumb||''}" onerror="this.style.display='none'" alt="">
          <div>
            <div class="s-it">${s.title}</div>
            <div class="s-im">${(s.genres||[]).join(', ')} · ${s.status||''}</div>
          </div>
        </div>`).join('');
    }, 380);
  });
}

// Set active nav
document.addEventListener('DOMContentLoaded', () => {
  const p = location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.nav-btn[data-page]').forEach(b => {
    if (b.dataset.page === p) b.classList.add('act');
  });
  initSearch();
});

document.addEventListener('DOMContentLoaded',()=>{ document.getElementById('nb-home')?.classList.add('act'); initSearch(); });
</script>
<script>
(async()=>{
  const [latest,ongoing]=await Promise.all([getLatestEpisodes(24),getOngoingSeries(12)]);
  if(latest.length){
    const h=latest[0];const s=h.series||{};
    document.getElementById('hero-bg').style.backgroundImage=`url('${s.thumb||''}')`;
    document.getElementById('hero-title').textContent=s.title||h.title||'';
    document.getElementById('hero-meta').innerHTML=`
      ${s.status?`<span>📡 ${s.status}</span>`:''}
      ${h.ep_num?`<span>📺 Ep ${h.ep_num}</span>`:''}
      ${s.rating?`<span class="hero-rating">★ ${s.rating}</span>`:''}
      ${h.release_date?`<span>📅 ${h.release_date}</span>`:''}`;
    document.getElementById('hero-desc').textContent=s.synopsis||'';
    document.getElementById('hero-btns').innerHTML=`
      <a href="episode.html?url=${encodeURIComponent(h.url)}" class="btn btn-red">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>Tonton Sekarang
      </a>
      <a href="series.html?slug=${s.slug||''}" class="btn btn-ghost">📋 Detail Series</a>`;
  }
  document.getElementById('latest').innerHTML=latest.length?latest.map(ep=>epCardHTML(ep)).join(''):'<div class="empty"><div class="empty-icon">📭</div><h3>BELUM ADA DATA</h3><p>Jalankan scraper dulu</p></div>';
  document.getElementById('ongoing').innerHTML=ongoing.length?ongoing.map(s=>cardHTML(s)).join(''):'<div class="empty"><div class="empty-icon">📭</div><h3>KOSONG</h3></div>';
  document.getElementById('sidebar-list').innerHTML=latest.slice(0,14).map(ep=>{
    const s=ep.series||{};
    return `<div class="oi" onclick="goEp('${encodeURIComponent(ep.url)}')">
      <img src="${s.thumb||''}" onerror="this.src='https://placehold.co/44x60/12121f/4a4a6a?text=?'" alt="">
      <div class="oi-info"><div class="oi-tit">${s.title||ep.title||''}</div><div class="oi-ep">${ep.ep_num?`Ep ${ep.ep_num}`:''} · ${timeAgo(ep.created_at)}</div></div>
      <span class="oi-new">NEW</span></div>`;
  }).join('');
})();
</script>
</body>
</html>
