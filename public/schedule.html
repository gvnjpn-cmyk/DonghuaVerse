<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Tayang — Noctyra Watch</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐉</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">🐉 Noctyra Watch</a>
    <div class="nav-links">
      <a href="/">Beranda</a>
      <a href="/schedule.html" class="active">Jadwal</a>
      <a href="/search.html">Series</a>
      <button class="nav-search-btn" id="search-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg> Cari
      </button>
    </div>
  </div>
</nav>

<div class="search-overlay" id="search-overlay">
  <button class="search-close" id="search-close">✕</button>
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Cari judul donghua...">
  </div>
  <div id="search-results"></div>
</div>

<main class="container page">
  <div class="section-header" style="margin-bottom:28px">
    <h1 class="section-title" style="font-family:'Cinzel',serif;font-size:1.4rem">Jadwal Tayang</h1>
    <span id="today-label" style="font-size:0.85rem;color:var(--muted)"></span>
  </div>

  <div id="schedule-wrap">
    <div class="loader"><div class="spinner"></div> Memuat jadwal...</div>
  </div>
</main>

<footer>
  <p>🐉 <span>Noctyra Watch</span> — Fansub Donghua Sub Indo</p>
</footer>

<script src="/js/app.js"></script>
<script>
(async () => {
  const DAYS = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  const todayName = DAYS[new Date().getDay()];
  document.getElementById("today-label").textContent = `Hari ini: ${todayName}`;

  const schedule = await getSchedule();

  // Group by day
  const grouped = {};
  DAYS.forEach(d => { grouped[d] = []; });

  schedule.forEach(item => {
    const day = item.day || "Tidak Diketahui";
    if (!grouped[day]) grouped[day] = [];
    grouped[day].push(item);
  });

  // Reorder: mulai dari hari ini
  const todayIdx = DAYS.indexOf(todayName);
  const orderedDays = [
    ...DAYS.slice(todayIdx),
    ...DAYS.slice(0, todayIdx)
  ];

  const wrap = document.getElementById("schedule-wrap");

  if (!schedule.length) {
    wrap.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📅</div>
        <h3>Jadwal belum tersedia</h3>
        <p>Jalankan scraper untuk mengisi jadwal</p>
      </div>`;
    return;
  }

  wrap.innerHTML = `
    <div class="schedule-grid">
      ${orderedDays.map(day => {
        const items = grouped[day] || [];
        const isToday = day === todayName;
        return `
          <div class="day-col">
            <div class="day-header ${isToday ? 'today' : ''}">
              ${isToday ? '📍 ' : ''}${day}
              ${isToday ? '(Hari ini)' : ''}
            </div>
            <div class="day-items">
              ${items.length
                ? items.map(item => `
                    <div class="day-item" onclick="goSeries('${item.series_slug || (item.series && item.series.slug) || ''}')">
                      <img class="day-thumb" src="${item.thumb || ''}" alt="${item.title}"
                           onerror="this.src='https://via.placeholder.com/40x54/141428/666680?text=?'">
                      <div class="day-title">${item.title}</div>
                    </div>`)
                  .join("")
                : `<div style="font-size:0.75rem;color:var(--muted);padding:8px 0">Tidak ada tayang</div>`
              }
            </div>
          </div>`;
      }).join("")}
    </div>
  `;
})();
</script>
</body>
</html>
